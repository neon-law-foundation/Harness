---
# Daily Release Workflow
#
# Builds the HarnessCLI for arm64, x86_64, and universal macOS targets, creates a versioned
# GitHub release (YYYY.MM.DD format), and updates Formula/harness.rb in the
# neon-law-foundation/homebrew-tap repository so `brew tap neon-law-foundation/tap` picks up
# the new version automatically.
#
# Required secret: HOMEBREW_TAP_TOKEN — a GitHub personal access token with `repo` scope,
# added to this repository's Settings → Secrets and variables → Actions. Without it, the
# formula update step is skipped with a warning.
name: Daily Release

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual triggering

concurrency:
  group: daily-release
  cancel-in-progress: false

env:
  SWIFT_VERSION: "6.2"

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +"%Y.%m.%d")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release v$VERSION does not exist, proceeding"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Swift toolchain
        if: steps.check_release.outputs.exists == 'false'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache Swift Package Manager dependencies
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-macos-release-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-macos-release-

      - name: Build for Apple Silicon (arm64)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          swift build -c release --product HarnessCLI --arch arm64
          mkdir -p dist/arm64
          cp .build/release/HarnessCLI dist/arm64/harness
          cp -R .build/release/Harness_HarnessDAL.bundle dist/arm64/

      - name: Build for Intel (x86_64)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          swift build -c release --product HarnessCLI --arch x86_64
          mkdir -p dist/x86_64
          cp .build/release/HarnessCLI dist/x86_64/harness
          cp -R .build/release/Harness_HarnessDAL.bundle dist/x86_64/

      - name: Create universal binary
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mkdir -p dist/universal
          lipo -create \
            dist/arm64/harness \
            dist/x86_64/harness \
            -output dist/universal/harness
          # Verify the universal binary
          lipo -info dist/universal/harness
          cp -R dist/arm64/Harness_HarnessDAL.bundle dist/universal/

      - name: Verify binaries
        if: steps.check_release.outputs.exists == 'false'
        run: |
          echo "Verifying arm64 binary..."
          file dist/arm64/harness
          dist/arm64/harness --help || true

          echo "Verifying x86_64 binary..."
          file dist/x86_64/harness

          echo "Verifying universal binary..."
          file dist/universal/harness
          dist/universal/harness --help

      - name: Package binaries
        if: steps.check_release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release

          # Package arm64
          tar -czf "release/harness-${VERSION}-macos-arm64.tar.gz" \
            -C dist/arm64 harness Harness_HarnessDAL.bundle

          # Package x86_64
          tar -czf "release/harness-${VERSION}-macos-x86_64.tar.gz" \
            -C dist/x86_64 harness Harness_HarnessDAL.bundle

          # Package universal
          tar -czf "release/harness-${VERSION}-macos-universal.tar.gz" \
            -C dist/universal harness Harness_HarnessDAL.bundle

          # Generate checksums
          cd release
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "Harness CLI v$VERSION" \
            --notes "Daily automated release for $(date +%Y-%m-%d).

          ## Installation

          ### macOS — Homebrew (Recommended)
          \`\`\`bash
          brew tap neon-law-foundation/tap
          brew install harness
          \`\`\`

          ### Windows — winget
          \`\`\`
          winget install neon-law-foundation.HarnessCLI
          \`\`\`

          ### Manual Download
          Download the appropriate binary for your system:
          - **Apple Silicon (M1/M2/M3)**: \`harness-${VERSION}-macos-arm64.tar.gz\`
          - **Intel Mac**: \`harness-${VERSION}-macos-x86_64.tar.gz\`
          - **Universal Mac**: \`harness-${VERSION}-macos-universal.tar.gz\`
          - **Windows x86_64**: \`harness-${VERSION}-windows-x86_64.zip\`

          **macOS** — extract and move to PATH:
          \`\`\`bash
          tar -xzf harness-${VERSION}-macos-universal.tar.gz
          sudo mv harness /usr/local/bin/
          \`\`\`

          **Windows** — extract zip and move \`harness.exe\` to a directory in your PATH.
          " \
            release/harness-*.tar.gz \
            release/checksums.txt

      - name: Get universal binary SHA256
        if: steps.check_release.outputs.exists == 'false'
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 "release/harness-${VERSION}-macos-universal.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Calculate checksums for formula
        if: steps.check_release.outputs.exists == 'false'
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA=$(shasum -a 256 "release/harness-${VERSION}-macos-arm64.tar.gz" | awk '{print $1}')
          X86_64_SHA=$(shasum -a 256 "release/harness-${VERSION}-macos-x86_64.tar.gz" | awk '{print $1}')
          echo "arm64_sha=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        if: steps.check_release.outputs.exists == 'false'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set. Skipping Homebrew formula update."
            echo "Please add HOMEBREW_TAP_TOKEN secret to enable automatic formula updates."
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA="${{ steps.checksums.outputs.arm64_sha }}"
          X86_64_SHA="${{ steps.checksums.outputs.x86_64_sha }}"

          # Clone the tap repository
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/neon-law-foundation/homebrew-tap.git" tap

          # Generate updated formula (no leading whitespace)
          cat > tap/Formula/harness.rb << 'FORMULA_EOF'
          class Harness < Formula
            desc "Legal standards CLI for Markdown linting, PDF conversion, and document management"
            homepage "https://github.com/neon-law-foundation/Harness"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/neon-law-foundation/Harness/releases/download/vVERSION_PLACEHOLDER/harness-VERSION_PLACEHOLDER-macos-arm64.tar.gz"
                sha256 "ARM64_SHA_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/neon-law-foundation/Harness/releases/download/vVERSION_PLACEHOLDER/harness-VERSION_PLACEHOLDER-macos-x86_64.tar.gz"
                sha256 "X86_64_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "harness"
              bin.install "Harness_HarnessDAL.bundle"
            end

            test do
              assert_match "harness", shell_output("#{bin}/harness --version")
            end
          end
          FORMULA_EOF

          # Replace placeholders with actual values
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/harness.rb
          sed -i '' "s/ARM64_SHA_PLACEHOLDER/${ARM64_SHA}/g" tap/Formula/harness.rb
          sed -i '' "s/X86_64_SHA_PLACEHOLDER/${X86_64_SHA}/g" tap/Formula/harness.rb

          # Remove leading whitespace from heredoc (caused by YAML indentation)
          sed -i '' 's/^          //' tap/Formula/harness.rb

          # Show the generated formula
          echo "Generated formula:"
          cat tap/Formula/harness.rb

          # Commit and push
          cd tap
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add Formula/harness.rb
          git commit -m "chore: update harness to v${VERSION}"
          git push

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        shell: bash
        run: |
          VERSION=$(date +"%Y.%m.%d")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Swift toolchain (Windows)
        if: steps.check_release.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ env.SWIFT_VERSION }}"
          $url = "https://download.swift.org/swift-${version}-release/windows10/swift-${version}-RELEASE/swift-${version}-RELEASE-windows10.exe"
          Write-Host "Downloading Swift $version..."
          Invoke-WebRequest -Uri $url -OutFile swift-installer.exe -UseBasicParsing
          Write-Host "Installing Swift..."
          $proc = Start-Process -FilePath .\swift-installer.exe -ArgumentList '/quiet', '/norestart' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Installer exited with code $($proc.ExitCode)" }
          # Read the registry PATH the installer just modified to find swift.exe
          $machinePath = [System.Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("Path", "User")
          $swiftPaths = ($machinePath + ";" + $userPath).Split(";") |
            Where-Object { $_ -and (Test-Path (Join-Path $_ "swift.exe")) }
          if ($swiftPaths) {
            $swiftPaths | ForEach-Object { Write-Host "Found Swift at: $_"; Add-Content $env:GITHUB_PATH $_ }
          } else {
            Write-Host "Swift not in registry PATH, searching filesystem..."
            $found = Get-ChildItem "C:\Program Files", $env:LOCALAPPDATA `
              -Recurse -Filter "swift.exe" -ErrorAction SilentlyContinue -Depth 7 |
              Select-Object -First 1
            if (-not $found) { throw "swift.exe not found after installation" }
            Write-Host "Found at: $($found.FullName)"
            Add-Content $env:GITHUB_PATH $found.DirectoryName
          }

      - name: Cache Swift Package Manager dependencies
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~\AppData\Local\cache\org.swift.swiftpm
          key: spm-windows-release-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-windows-release-

      - name: Build HarnessCLI for Windows
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        run: |
          swift build -c release --product HarnessCLI
          mkdir -p dist/windows
          cp .build/release/HarnessCLI.exe dist/windows/harness.exe

      - name: Package Windows binary
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release
          cd dist/windows
          7z a "../../release/harness-${VERSION}-windows-x86_64.zip" harness.exe
          cd ../../release
          sha256sum "harness-${VERSION}-windows-x86_64.zip" \
            > "harness-${VERSION}-windows-x86_64.zip.sha256"
          cat "harness-${VERSION}-windows-x86_64.zip.sha256"

      - name: Upload Windows artifacts to GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "v$VERSION" \
            "release/harness-${VERSION}-windows-x86_64.zip" \
            "release/harness-${VERSION}-windows-x86_64.zip.sha256"

      - name: Update winget manifest
        if: steps.check_release.outputs.exists == 'false'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set. Skipping winget manifest update."
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          ZIP_URL="https://github.com/neon-law-foundation/Harness/releases/download/v${VERSION}/harness-${VERSION}-windows-x86_64.zip"

          dotnet tool install --global wingetcreate

          wingetcreate update neon-law-foundation.HarnessCLI \
            --version "$VERSION" \
            --urls "$ZIP_URL" \
            --token "$HOMEBREW_TAP_TOKEN" \
            --submit
