---
name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: "actions/checkout@v4"

      - name: Install Swift toolchain (macOS / Linux)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install Swift toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:SWIFT_VERSION
          $url = "https://download.swift.org/swift-${version}-release/windows10/swift-${version}-RELEASE/swift-${version}-RELEASE-windows10.exe"
          Write-Host "Downloading Swift $version..."
          Invoke-WebRequest -Uri $url -OutFile swift-installer.exe -UseBasicParsing
          Write-Host "Installing Swift..."
          $proc = Start-Process -FilePath .\swift-installer.exe -ArgumentList '/quiet', '/norestart' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Installer exited with code $($proc.ExitCode)" }
          echo "C:\Program Files\Swift\bin" >> $env:GITHUB_PATH

      - name: Run Swift Format Lint
        if: runner.os != 'Windows'
        run: swift format lint --strict --recursive --parallel --no-color-diagnostics .

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ${{ runner.os == 'Windows' && '~\AppData\Local\cache\org.swift.swiftpm' || '~/.cache/org.swift.swiftpm' }}
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run Swift Build (Strict - Fail on Warnings)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run tests
        run: swift test
