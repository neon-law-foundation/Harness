---
name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: "actions/checkout@v4"

      - name: Install Swift toolchain (macOS / Linux)
        if: runner.os != 'Windows'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install Swift toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:SWIFT_VERSION
          $url = "https://download.swift.org/swift-${version}-release/windows10/swift-${version}-RELEASE/swift-${version}-RELEASE-windows10.exe"
          Write-Host "Downloading Swift $version..."
          Invoke-WebRequest -Uri $url -OutFile swift-installer.exe -UseBasicParsing
          Write-Host "Installing Swift..."
          $proc = Start-Process -FilePath .\swift-installer.exe -ArgumentList '/quiet', '/norestart' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Installer exited with code $($proc.ExitCode)" }
          # Merge ALL Machine and User environment variables into the runner session.
          # This ensures SDKROOT and other vars set by the Swift installer are visible
          # to subsequent steps (following the compnerd/gha-setup-swift approach).
          foreach ($level in "Machine", "User") {
            [Environment]::GetEnvironmentVariables($level).GetEnumerator() | ForEach-Object {
              if ($_.Name -eq "Path") {
                $_.Value = ("${env:Path};$($_.Value)" -Split ";") -Join ";"
              }
              $_
            } | Set-Content -Path { "Env:$($_.Name)" }
          }
          Write-Output "$env:Path" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8
          Get-ChildItem Env: | ForEach-Object {
            "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Run Swift Format Lint
        if: runner.os != 'Windows'
        run: swift format lint --strict --recursive --parallel --no-color-diagnostics .

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ${{ runner.os == 'Windows' && '~\AppData\Local\cache\org.swift.swiftpm' || '~/.cache/org.swift.swiftpm' }}
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run Swift Build (Strict - Fail on Warnings)
        if: runner.os != 'Windows'
        run: swift build -Xswiftc -warnings-as-errors

      - name: Configure git for Windows NTFS paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.protectNTFS false

      - name: Run Swift Build HarnessCLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: swift build -Xswiftc -warnings-as-errors --product HarnessCLI

      # swift test is skipped on Windows because CNIOBoringSSL (via swift-nio-ssl → Vapor)
      # fails to compile against Windows SDK 10.0.26100.0 due to winsock.h/winsock2.h
      # redefinition conflicts. Tracked upstream: https://github.com/apple/swift-nio-ssl/issues/342
      # Re-enable once https://github.com/apple/swift-nio-ssl/pull/567 is merged and released.
      - name: Run tests
        if: runner.os != 'Windows'
        run: swift test
