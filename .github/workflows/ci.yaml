---
name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            swift-version: "6.2"
          - os: macos-latest
            swift-version: "6.2"
          - os: windows-latest
            swift-version: "6.1"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: "actions/checkout@v4"

      - name: Install Swift toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift-version }}

      - name: Run Swift Format Lint
        if: runner.os != 'Windows'
        run: swift format lint --strict --recursive --parallel --no-color-diagnostics .

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ${{ runner.os == 'Windows' && '~\AppData\Local\cache\org.swift.swiftpm' || '~/.cache/org.swift.swiftpm' }}
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run Swift Build (Strict - Fail on Warnings)
        if: runner.os != 'Windows'
        run: swift build -Xswiftc -warnings-as-errors

      - name: Run Swift Build HarnessCLI (Windows)
        if: runner.os == 'Windows'
        run: swift build -Xswiftc -warnings-as-errors --product HarnessCLI

      - name: Run tests
        run: swift test
