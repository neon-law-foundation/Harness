name: Daily Release

on:
  schedule:
    # Run daily at 2 AM UTC (6 PM PST / 7 PM PDT)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Generate version from date
        id: version
        run: |
          VERSION=$(date +"%y.%m.%d")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📅 Version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view "v$VERSION" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Release v$VERSION already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Release v$VERSION does not exist, proceeding"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build for Apple Silicon (arm64)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          swift build -c release --arch arm64
          mkdir -p dist
          cp .build/arm64-apple-macosx/release/StandardsCLI dist/standards-macos-arm64

      - name: Build for Intel (x86_64)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          swift build -c release --arch x86_64
          cp .build/x86_64-apple-macosx/release/StandardsCLI dist/standards-macos-x86_64

      - name: Create universal binary
        if: steps.check_release.outputs.exists == 'false'
        run: |
          lipo -create \
            dist/standards-macos-arm64 \
            dist/standards-macos-x86_64 \
            -output dist/standards-macos-universal

          # Make executable
          chmod +x dist/standards-macos-universal

          # Verify
          file dist/standards-macos-universal
          lipo -info dist/standards-macos-universal

      - name: Create archives
        if: steps.check_release.outputs.exists == 'false'
        run: |
          cd dist

          # Create tar.gz for arm64
          tar -czf standards-${{ steps.version.outputs.version }}-macos-arm64.tar.gz standards-macos-arm64

          # Create tar.gz for x86_64
          tar -czf standards-${{ steps.version.outputs.version }}-macos-x86_64.tar.gz standards-macos-x86_64

          # Create tar.gz for universal
          tar -czf standards-${{ steps.version.outputs.version }}-macos-universal.tar.gz standards-macos-universal

          # Generate SHA256 checksums
          shasum -a 256 *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}

          gh release create "v$VERSION" \
            --title "Release $VERSION" \
            --notes "🚀 Automated daily release for $VERSION

          ## Installation

          ### Homebrew (recommended)
          \`\`\`bash
          brew install neon-law-foundation/tap/standards
          \`\`\`

          ### Manual Installation

          **Universal binary (works on both Apple Silicon and Intel):**
          \`\`\`bash
          curl -L https://github.com/neon-law-foundation/SagebrushStandards/releases/download/v$VERSION/standards-$VERSION-macos-universal.tar.gz | tar xz
          sudo mv standards-macos-universal /usr/local/bin/standards
          \`\`\`

          **Apple Silicon (M1/M2/M3):**
          \`\`\`bash
          curl -L https://github.com/neon-law-foundation/SagebrushStandards/releases/download/v$VERSION/standards-$VERSION-macos-arm64.tar.gz | tar xz
          sudo mv standards-macos-arm64 /usr/local/bin/standards
          \`\`\`

          **Intel:**
          \`\`\`bash
          curl -L https://github.com/neon-law-foundation/SagebrushStandards/releases/download/v$VERSION/standards-$VERSION-macos-x86_64.tar.gz | tar xz
          sudo mv standards-macos-x86_64 /usr/local/bin/standards
          \`\`\`

          ## What's Included

          - Standards CLI tool
          - Database seeding capabilities
          - Legal standards management

          ## Changes

          Daily automated build from \`main\` branch.

          **Full Changelog**: https://github.com/neon-law-foundation/SagebrushStandards/commits/v$VERSION" \
            dist/standards-$VERSION-macos-arm64.tar.gz \
            dist/standards-$VERSION-macos-x86_64.tar.gz \
            dist/standards-$VERSION-macos-universal.tar.gz \
            dist/checksums.txt

      - name: Update Homebrew Tap
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA256=$(shasum -a 256 dist/standards-$VERSION-macos-universal.tar.gz | awk '{print $1}')

          # Clone the tap repository
          git clone https://github.com/neon-law-foundation/homebrew-tap.git tap
          cd tap

          # Update the formula
          cat > Formula/standards.rb <<EOF
          class Standards < Formula
            desc "Legal standards and compliance management CLI"
            homepage "https://github.com/neon-law-foundation/SagebrushStandards"
            url "https://github.com/neon-law-foundation/SagebrushStandards/releases/download/v${VERSION}/standards-${VERSION}-macos-universal.tar.gz"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "Apache-2.0"

            def install
              bin.install "standards-macos-universal" => "standards"
            end

            test do
              assert_match "standards", shell_output("#{bin}/standards --version")
            end
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/standards.rb
          git commit -m "chore: update standards to v${VERSION}"
          git push

      - name: Cleanup
        if: always()
        run: |
          rm -rf dist tap
